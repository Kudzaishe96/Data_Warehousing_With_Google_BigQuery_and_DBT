# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'dbt_bg_learning'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'dbt_bg_learning'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
models:
  dbt_bg_learning:
    # --- STAGING LAYER ---
    staging:
      +schema: stage
      +materialized: view  # Staging models are best kept as lightweight views

    # --- BRONZE LAYER ---
    bronze:
      +schema: bronze
      +materialized: table # Raw ingested source data structured into base tables

    # --- SILVER LAYER ---
    silver:
      +schema: silver      # Fixed the typo from 'silvers' to 'silver' to match your model specs

    # --- GOLD / MARTS LAYER (Added for completeness!) ---
    gold:
      +schema: gold
      +materialized: table # Analytical dimensions/facts optimized for Power BI